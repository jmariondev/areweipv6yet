name: IPv6 Check

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      # GitHub-hosted runners have no IPv6 connectivity, so this is the DNS
      # mode only. HTTP-over-IPv6 results are contributed out-of-band via
      # "npm run check:http" from an IPv6-capable machine.
      - name: Run DNS checks
        run: npm run check

      - name: Commit results
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/results.json
          git diff --staged --quiet || git commit -m "Automated IPv6 check update"
          git push

  # Pushes made with GITHUB_TOKEN never trigger the push-based deploy
  # workflow, so call it explicitly.
  deploy:
    needs: check
    uses: ./.github/workflows/deploy.yml
    secrets: inherit
