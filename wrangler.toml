# Primary site: assets-only Worker (no script). Security headers live in
# public/_headers. HTTP->HTTPS is the zone's "Always Use HTTPS" setting.
# Alternate domains are handled by wrangler.redirects.toml.
name = "areweipv6yet"
compatibility_date = "2026-07-01"
assets = { directory = "./dist" }

[[routes]]
pattern = "areweipv6yet.com/*"
zone_name = "areweipv6yet.com"
